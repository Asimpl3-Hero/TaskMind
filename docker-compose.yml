services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-taskmind}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-taskmind}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    environment:
      API_URL: http://api:8000
    command: ["streamlit", "run", "frontend/app.py", "--server.headless", "true", "--server.address", "0.0.0.0"]
    depends_on:
      - api

volumes:
  pgdata:
